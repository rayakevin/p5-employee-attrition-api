services:
  postgres:
    image: postgres:17
    container_name: p5_attrition_postgres
    environment:
      POSTGRES_DB: p5_attrition
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d p5_attrition"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
